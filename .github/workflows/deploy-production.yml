name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy-migrations:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to production project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PRODUCTION_PROJECT_REF }} --password ${{ secrets.SUPABASE_PRODUCTION_DB_PASSWORD }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push migrations to production
        run: |
          for i in 1 2 3; do
            echo "Attempt $i..."
            supabase db push --include-all && exit 0
            echo "Attempt $i failed, waiting 60 seconds..."
            sleep 60
          done
          echo "All attempts failed — apply migrations locally with: supabase db push --include-all"
          exit 1
        timeout-minutes: 10
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_PRODUCTION_DB_PASSWORD }}

  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy frontend to production
        run: railway up --service frontend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_PRODUCTION_TOKEN }}

  deploy-api-proxy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api-proxy
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: api-proxy/package-lock.json

      - run: npm ci
      - run: npm run build

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy api-proxy to production
        run: railway up --service api-proxy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_PRODUCTION_TOKEN }}
