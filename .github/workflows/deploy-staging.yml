name: Deploy to Staging

on:
  push:
    branches: [staging]

jobs:
  deploy-migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to staging project
        run: supabase link --project-ref ${{ secrets.SUPABASE_STAGING_PROJECT_REF }} --password ${{ secrets.SUPABASE_STAGING_DB_PASSWORD }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Verify secrets are set
        run: |
          echo "DB_PASSWORD length: ${#SUPABASE_DB_PASSWORD}"
          echo "ACCESS_TOKEN set: $([ -n "$SUPABASE_ACCESS_TOKEN" ] && echo yes || echo no)"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_STAGING_DB_PASSWORD }}

      - name: Push migrations to staging
        run: |
          for i in 1 2 3 4 5; do
            echo "Attempt $i..."
            supabase db push --include-all && exit 0
            echo "Attempt $i failed, waiting 30 seconds..."
            sleep 30
          done
          echo "All attempts failed"
          exit 1
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_STAGING_DB_PASSWORD }}

  deploy-frontend:
    needs: deploy-migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy frontend to staging
        run: railway up --service frontend-staging
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_STAGING_TOKEN }}

  deploy-api-proxy:
    needs: deploy-migrations
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api-proxy
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: api-proxy/package-lock.json

      - run: npm ci
      - run: npm run build

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy api-proxy to staging
        run: railway up --service api-proxy-staging
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_STAGING_TOKEN }}
