<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#F1ECE3" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="WorkIn" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Display serif (Fraunces) for the editorial headings -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..500&family=Inter:wght@400..700&display=swap" rel="stylesheet" />
    <title>WorkIn.ai — It's Not a Workout. It's a WorkIN.</title>
    <!-- Flash-free theme initialization -->
    <script>
      (function() {
        var t = localStorage.getItem('workin-theme') || 'system';
        var dark = t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) document.documentElement.classList.add('dark');
        var m = document.querySelector('meta[name="theme-color"]');
        if (m) m.setAttribute('content', dark ? '#14110E' : '#F1ECE3');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        // Only register SW in production — in dev mode it caches stale
        // assets and breaks Vite HMR WebSocket connections.
        const isDev = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
        if (isDev) {
          // Unregister any existing SW from a previous session
          navigator.serviceWorker.getRegistrations().then((regs) => {
            for (const r of regs) r.unregister();
          });
        } else {
          window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js').then((reg) => {
              // Check for updates every 5 minutes (not aggressively)
              setInterval(() => reg.update(), 5 * 60 * 1000);
            });
          });
        }
      }
    </script>
  </body>
</html>
